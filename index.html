<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Kado Interaktif - Hasz Familia</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center; padding: 20px; box-sizing: border-box;
    }
    #start-btn {
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      background: gray; color: white; border: none; border-radius: 8px;
      margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #example-scanning-overlay { display: none; }
    .error-box { background: white; color: black; padding: 10px; border-radius: 5px; font-family: monospace; word-break: break-all; margin-top: 10px;}
  </style>

  <script>
    // 1. MASUKKAN URL DAN ANON KEY ANDA DI SINI
    const SUPABASE_URL = 'https://zwlcanroyejglldvqtbu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3bGNhbnJveWVqZ2xsZHZxdGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ5NDQsImV4cCI6MjA5MTEzMDk0NH0.W2oWeFIIDuqkb5hoAAx-oX9c-PXMCY74fet7vP4Cr58';

    // 2. Inisialisasi Koneksi (Menggunakan supabaseClient)
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. Komponen AR
    AFRAME.registerComponent('ar-video-controller', {
      init: function () {
        this.target = this.el; 
        this.videoEl = document.querySelector('#ar-video');

        this.target.addEventListener('targetFound', () => {
          this.videoEl.play();
        });

        this.target.addEventListener('targetLost', () => {
          this.videoEl.pause();
        });
      }
    });

    // 4. Logika Utama
    document.addEventListener("DOMContentLoaded", async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');
      const videoElement = document.querySelector('#ar-video');
      const uiOverlay = document.querySelector('#ui-overlay');
      const startBtn = document.querySelector('#start-btn');

      startBtn.disabled = true;

      // Pengecekan URL
      if (!orderId) {
        uiOverlay.innerHTML = "<h3 style='color:#ff4444;'>Gagal: ID Tidak Ditemukan!</h3><p>Pastikan link Anda diakhiri dengan <b>?id=ID_PESANAN_ANDA</b></p>";
        return;
      }

      try {
        uiOverlay.querySelector('h3').innerText = "Menghubungkan ke Database...";
        
        // Pengecekan Database menggunakan supabaseClient (BUKAN supabase)
        const { data, error } = await supabaseClient
          .from('orders')
          .select('target_video_url')
          .eq('id', orderId)
          .single();

        if (error) throw new Error(error.message);
        if (!data) throw new Error("ID tidak ada di tabel orders.");

        // Jika Sukses
        videoElement.setAttribute('src', data.target_video_url);
        
        uiOverlay.querySelector('h3').innerText = "Kado Digital Siap!";
        startBtn.disabled = false;
        startBtn.style.background = "#007BFF";
        startBtn.style.cursor = "pointer";
        startBtn.innerText = "Mulai Scan Kado";
        
        startBtn.addEventListener('click', () => {
          uiOverlay.style.display = 'none'; 
          videoElement.play();
          videoElement.pause(); 
        });

      } catch (err) {
        uiOverlay.innerHTML = `<h3 style='color:#ff4444;'>Koneksi Gagal</h3>
                               <p>Pesan Error:</p>
                               <div class='error-box'>${err.message}</div>
                               <p>Pastikan ANON KEY dan URL Supabase sudah diisi dengan benar.</p>`;
      }
    });
  </script>
</head>
<body>

  <div id="ui-overlay">
    <h3>Mempersiapkan AR...</h3>
    <p>Mohon tunggu sebentar.</p>
    <button id="start-btn">Loading database...</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #example-scanning-overlay;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="ar-video" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" ar-video-controller>
      <a-video src="#ar-video" position="0 0 0" width="1" height="1.5" rotation="0 0 0"></a-video>
    </a-entity>
  </a-scene>

</body>
</html>
